name: VibeGuide Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: VibeGuide self-check (dogfooding)
        run: npm run check

      - name: Run MCP tests
        run: node test-mcp.cjs

      - name: Run scenario tests
        run: node test-scenario.cjs

      - name: Run batch 2 tests
        run: node test-batch2.cjs

      - name: Run future tools tests
        run: node test-future-tools.cjs

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-*.cjs
            dist/
